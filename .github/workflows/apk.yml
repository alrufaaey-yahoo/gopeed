name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  # تغيير من macos-13 المعطلة إلى ubuntu لـ Android builds السريعة

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses
      run: yes | sdkmanager --licenses

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'
        cache: true

    - name: Flutter doctor
      run: flutter doctor -v

    - name: Flutter dependencies
      run: |
        cd ui/flutter
        flutter clean
        flutter pub get

    - name: Gradle cache
      uses: actions/cache@v4
      with:
        path: |
          ui/flutter/android/.gradle/caches
          ui/flutter/android/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('ui/flutter/android/**.gradle*', 'ui/flutter/android/gradlew') }}
        restore-keys: ${{ runner.os }}-gradle-

    - name: Create local.properties
      run: |
        mkdir -p ui/flutter/android
        echo "sdk.dir=$ANDROID_SDK_ROOT" > ui/flutter/android/local.properties
        echo "flutter.sdk=$(flutter --version --machine | grep Flutter | awk '{print $2}')" >> ui/flutter/android/local.properties

    - name: Build APK (debug, unsigned)
      run: |
        cd ui/flutter
        flutter build apk --debug --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gopeed-debug.apk
        path: ui/flutter/build/app/outputs/flutter-apk/app-debug.apk
