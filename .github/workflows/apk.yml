name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Java (متوافق مع Gradle في المشروع)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Install Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   # نفس الإصدار الموجود في المستودع

      # 4. Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Build APK (بدون توقيع)
      - name: Build APK
        run: flutter build apk --debug --no-shrink

      # 6. رفع الـ APK كـ artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: gopeed-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
