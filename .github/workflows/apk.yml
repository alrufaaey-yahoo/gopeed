name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'  # استخدم إصدار Flutter متوافق مع المشروع
        channel: 'stable'

    - name: Get Flutter dependencies
      run: flutter pub get
      working-directory: ./ui/flutter

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > ui/flutter/android/local.properties
      env:
        ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/Android/sdk

    - name: Build APK (debug - unsigned)
      run: flutter build apk --debug
      working-directory: ./ui/flutter

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gopeed-app-debug.apk
        path: ui/flutter/build/app/outputs/flutter-apk/app-debug.apk
